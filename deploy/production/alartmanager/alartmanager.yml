global:
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@safari-shield.com'
  smtp_auth_username: 'alerts@safari-shield.com'
  smtp_auth_password: 'your-password'

route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s
  group_interval: 2m
  repeat_interval: 4h
  receiver: 'default'
  routes:
  - match:
      severity: critical
    receiver: critical
    continue: true
  - match:
      service: fraud
    receiver: fraud-team
  - match:
      service: system
    receiver: ops-team

receivers:
- name: 'default'
  email_configs:
  - to: 'team@safari-shield.com'
    send_resolved: true

- name: 'critical'
  slack_configs:
  - channel: '#critical-alerts'
    title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
    text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
    send_resolved: true
  pagerduty_configs:
  - service_key: 'your-pagerduty-key'
    send_resolved: true

- name: 'fraud-team'
  slack_configs:
  - channel: '#fraud-alerts'
    title: '🚨 Fraud Alert: {{ .GroupLabels.alertname }}'
    text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
    send_resolved: true
  email_configs:
  - to: 'fraud-team@safari-shield.com'
    send_resolved: true

- name: 'ops-team'
  slack_configs:
  - channel: '#ops-alerts'
    title: '⚠️ System Alert: {{ .GroupLabels.alertname }}'
    text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
    send_resolved: true
  email_configs:
  - to: 'ops-team@safari-shield.com'
    send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']