name: Deploy to Production

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  AWS_REGION: eu-west-1
  EKS_CLUSTER: safari-shield-prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black
    
    - name: Lint
      run: |
        flake8 src/ --count --max-complexity=10 --max-line-length=127 --statistics
        black src/ --check --diff
    
    - name: Test
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.DOCKER_REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKER_REGISTRY }}/safari-shield-api
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    
    - name: Build and push API
      uses: docker/build-push-action@v4
      with:
        context: .
        file: deploy/production/Dockerfile.api
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Worker
      uses: docker/build-push-action@v4
      with:
        context: .
        file: deploy/production/Dockerfile.worker
        push: true
        tags: ${{ secrets.DOCKER_REGISTRY }}/safari-shield-worker:${{ steps.meta.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
    
    - name: Deploy to staging
      run: |
        kubectl set image deployment/api api=${{ secrets.DOCKER_REGISTRY }}/safari-shield-api:${{ github.sha }} -n safari-shield-staging
        kubectl set image deployment/worker worker=${{ secrets.DOCKER_REGISTRY }}/safari-shield-worker:${{ github.sha }} -n safari-shield-staging
    
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/api -n safari-shield-staging
        kubectl rollout status deployment/worker -n safari-shield-staging
    
    - name: Run smoke tests
      run: |
        ./scripts/smoke_test.sh staging

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
    
    - name: Deploy to production
      run: |
        kubectl set image deployment/api api=${{ secrets.DOCKER_REGISTRY }}/safari-shield-api:${{ github.event.release.tag_name }} -n safari-shield-production
        kubectl set image deployment/worker worker=${{ secrets.DOCKER_REGISTRY }}/safari-shield-worker:${{ github.event.release.tag_name }} -n safari-shield-production
    
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/api -n safari-shield-production --timeout=5m
        kubectl rollout status deployment/worker -n safari-shield-production --timeout=5m
    
    - name: Run smoke tests
      run: |
        ./scripts/smoke_test.sh production
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          deploy/kubernetes/*.yaml
          docker-compose.prod.yml
    env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}